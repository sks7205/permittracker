<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let API_URL = localStorage.getItem("ars2_api_url") || "";
let permits = [];
// ─── ADDED FOR GLOBAL TRUST REGISTRY LAYER ───
if (!localStorage.getItem("DEVICE_TOKEN")) {
  const arr = new Uint8Array(16);
  window.crypto.getRandomValues(arr);
  const token = Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
  localStorage.setItem("DEVICE_TOKEN", "DEV-" + token);
}
const DEVICE_TOKEN = localStorage.getItem("DEVICE_TOKEN");
// ─────────────────────────────────────────────
// meta is stored per-phone in localStorage — never overwritten by sheet
function loadMeta() {
  try {
    const saved = localStorage.getItem("ars2_meta");
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { date: todayStr(), shift: "", issuer: "" };
}
let meta = loadMeta();
let currentView = "list";
let sectionFilter = "ALL";
let editingPermit = null;
let syncing = false;
let lastSync = null;
let refreshTimer = null;
// Keep your existing variables exactly as they are, just add these below them:
let rangeStartDate = ""; // Will default to today's date automatically
let rangeStartShift = "A";
let rangeEndDate = "";   // Will default to today's date automatically
let rangeEndShift = "C";
// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
// Helper to turn DD/MM/YYYY and Shift into a chronological comparison number
function getShiftScore(dateStr, shift) {
  if (!dateStr) return 0;
  const parts = dateStr.split("/");
  if (parts.length !== 3) return 0;
  const day = parseInt(parts[0], 10);
  const month = parseInt(parts[1], 10) - 1;
  const year = parseInt(parts[2], 10);
  const dateObj = new Date(year, month, day);
  let shiftVal = 0;
  if (shift === "A") shiftVal = 1;
  if (shift === "B") shiftVal = 2;
  if (shift === "C") shiftVal = 3;
  if (shift === "G") shiftVal = 1.5;
  return dateObj.getTime() + (shiftVal * 100000);
}
// Logic to pull unreturned permits in the selected range
function getRangeUnreturnedPermits() {
  // If dates aren't set yet, fallback to meta date
  const startD = rangeStartDate || meta.date;
  const endD = rangeEndDate || meta.date;
  const startScore = getShiftTimelineScore(startD, rangeStartShift);
  const endScore = getShiftTimelineScore(endD, rangeEndShift);
  if (startScore > endScore) return [];
  const targetOrdersMap = new Map();
  // Find all permits that fall within the selected timeframe window
  permits.forEach(p => {
    const d = String(p.shiftDate || "").trim();
    const s = String(p.shift || "").trim();
    if (!d || !s) return;
    const itemScore = getShiftTimelineScore(d, s);
    if (itemScore >= startScore && itemScore <= endScore) {
      if (!targetOrdersMap.has(p.orderNo) || itemScore > getShiftTimelineScore(targetOrdersMap.get(p.orderNo).shiftDate, targetOrdersMap.get(p.orderNo).shift)) {
        targetOrdersMap.set(p.orderNo, p);
      }
    }
  });
  const unreturnedList = [];
  // Check the absolute latest status of those permits across the entire system database
  for (let [orderNo, targetPermit] of targetOrdersMap) {
    const history = permits.filter(p => String(p.orderNo).trim() === String(orderNo).trim());
    let latestPermit = history[0];
    let maxScore = getShiftTimelineScore(latestPermit.shiftDate, latestPermit.shift);
    for (let i = 1; i < history.length; i++) {
      const score = getShiftTimelineScore(history[i].shiftDate, history[i].shift);
      if (score > maxScore) {
        maxScore = score;
        latestPermit = history[i];
      }
    }
    // If its absolute latest status across the database is NOT returned, it's unreturned!
    if (latestPermit && latestPermit.status !== "returned") {
      unreturnedList.push({
        orderNo: orderNo,
        jobDescription: latestPermit.jobDescription || targetPermit.jobDescription,
        section: latestPermit.section || targetPermit.section,
        receiver: latestPermit.receiver || targetPermit.receiver,
        lastSeenDate: latestPermit.shiftDate,
        lastSeenShift: latestPermit.shift,
        lastStatus: latestPermit.status || "Issued"
      });
    }
  }
  return unreturnedList;
}
// Logic to identify unreturned permits across a custom period
function getRangeUnreturnedPermits() {
  const startScore = getShiftScore(rangeStartDate, rangeStartShift);
  const endScore = getShiftScore(rangeEndDate, rangeEndShift);
  if (startScore > endScore) return [];
  // 1. Gather all unique order numbers matching our target date/shift timeframe
  const targetOrdersMap = new Map();
  permits.forEach(p => {
    const d = String(p.shiftDate || "").trim();
    const s = String(p.shift || "").trim();
    if (!d || !s) return;
    const itemScore = getShiftScore(d, s);
    if (itemScore >= startScore && itemScore <= endScore) {
      // Keep track of the most recent entry within this range for reference
      if (!targetOrdersMap.has(p.orderNo) || itemScore > getShiftScore(targetOrdersMap.get(p.orderNo).shiftDate, targetOrdersMap.get(p.orderNo).shift)) {
        targetOrdersMap.set(p.orderNo, p);
      }
    }
  });
  const unreturnedList = [];
  // 2. Check the absolute newest lifecycle entry of each permit in the entire system
  for (let [orderNo, targetPermit] of targetOrdersMap) {
    // Look up all occurrences of this permit across the complete system history
    const history = permits.filter(p => String(p.orderNo).trim() === String(orderNo).trim());
    // Track chronologically the absolute latest status entry
    let latestPermit = history[0];
    let maxScore = getShiftScore(latestPermit.shiftDate, latestPermit.shift);
    for (let i = 1; i < history.length; i++) {
      const score = getShiftScore(history[i].shiftDate, history[i].shift);
      if (score > maxScore) {
        maxScore = score;
        latestPermit = history[i];
      }
    }
    // If the latest available record is not marked as 'returned', it's unreturned!
    if (latestPermit && latestPermit.status !== "returned") {
      unreturnedList.push({
        orderNo: orderNo,
        jobDescription: latestPermit.jobDescription || targetPermit.jobDescription,
        section: latestPermit.section || targetPermit.section,
        receiver: latestPermit.receiver || targetPermit.receiver,
        contactNo:latestPermit.contactNo || targetPermit.contactNo,
        lastSeenDate: latestPermit.shiftDate,
        lastSeenShift: latestPermit.shift,
        lastStatus: latestPermit.status || "Issued"
      });
    }
  }
  return unreturnedList;
}
function extendUnaccountedPermit(id) {
  const oldPermit = permits.find(p => String(p.id) === String(id));
  if (!oldPermit) return;
  // Pre-fill the form with the old data, but force the status to 'extended'
  // and clear out the old isolation/issue times so you can stamp them fresh if needed
  const prefill = {
    ...oldPermit,
    status: "extended",
    isolationTime: "",
    issueTime: "",
    extendedTime: nowTime()
  };
  // Open as a NEW permit (not an edit) so it saves to the current shift's log
  showPermitForm(prefill);
}
function getPreviousShift(currentDateStr, currentShift) {
  const parts = currentDateStr.split("/");
  if (parts.length !== 3) return null;
  // Create a proper Date object (Month is 0-indexed in JS)
  let d = new Date(parts[2], parseInt(parts[1]) - 1, parts[0]);
  let prevShift = "";
  if (currentShift === "B") { 
    prevShift = "A"; 
  } else if (currentShift === "C") { 
    prevShift = "B"; 
  } else if (currentShift === "A") { 
    prevShift = "C";
    d.setDate(d.getDate() - 1); // Subtract one day for the A -> C handover
  } else {
    // If it's "G" (General) or an unknown shift, we can't reliably predict the handover
    return null; 
  }
  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const yyyy = d.getFullYear();
  return { date: `${dd}/${mm}/${yyyy}`, shift: prevShift };
}
function unaccountedPermits() {
  const prev = getPreviousShift(meta.date, meta.shift);
  if (!prev) return []; 
  // Get all permits already logged in the PRESENT shift
  const currentShiftPermits = activePermits();
  return permits.filter(p => {
    const d = String(p.shiftDate || "").trim();
    const s = String(p.shift || "").trim();
    // 1. Only look at permits from the exact previous shift
    if (d !== prev.date || s !== prev.shift) return false; 
    // 2. If it was properly returned by the outgoing shift, it is accounted for
    if (p.status === "returned") return false;
    // 3. CROSS-CHECK: Has the PRESENT shift logged this exact orderNo as "extended"?
    const isExtendedInCurrent = currentShiftPermits.some(currP => 
      currP.orderNo === p.orderNo
    );
    // If the present shift hasn't extended it, it remains unaccounted.
    return !isExtendedInCurrent;
  });
}
function classifyOrder(orderNo) {
  const s = String(orderNo||"").trim().replace(/\D/g,"");
  if (!s) return "";
  const len = s.length, first = s[0];
  if (len===8 && first==="1") return "MA";
  if (len===9 && first==="1") return "M1";
  if (len===9 && first==="2") return "M2";
  if (len===9 && first==="3") return "M3";
  if (len===9 && first==="4") return "M4";
  return "—";
}
function orderTypeBadgeCls(t) {
  return {MA:"badge-purple",M1:"badge-blue",M2:"badge-orange",M3:"badge-teal",M4:"badge-red"}[t]||"badge-gray";
}
function sectionBadgeCls(s) {
  if (s==="Mechanical") return "badge-blue";
  if (s==="Electrical") return "badge-yellow";
  if (s==="Operation")  return "badge-green";
  return "badge-gray";
}
function todayStr() {
  const d=new Date(); return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}
function pad(n) { return String(n).padStart(2,"0"); }
function nowTime() { return new Date().toTimeString().slice(0,5); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

async function api(action, body={}) {
  if (!API_URL) throw new Error("No API URL");
  // Injected deviceToken safely into the destructuring payload
  const res = await fetch(API_URL, {
    method:"POST", body:JSON.stringify({action, deviceToken: DEVICE_TOKEN, ...body}), headers:{"Content-Type":"text/plain"}
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function loadAll() {
  // Only load permits from server — meta is per-phone (localStorage)
  const p = await api("getAll");
  permits = (p.permits||[]).map(x=>({...x, id:String(x.id)}));
  lastSync = new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
}

function activePermits() {
  return permits.filter(p => {
    const d = String(p.shiftDate || "").trim();
    const s = String(p.shift     || "").trim();
    // Old records without shiftDate: always show so data is never hidden
    if (!d || !s) return true;
    // If shift selection is cleared/blank, show all entries matching just the date
    if (!meta.shift) {
      return d === meta.date;
    }
    return d === meta.date && s === meta.shift;
  });
}
function render() {
  const app = document.getElementById("app");
  if (!API_URL) { app.innerHTML = renderConfig(); return; }
  // 1. SAVE SCROLL POSITIONS (Both global page window and the report table container)
  const savedWindowScrollTop = window.scrollY || document.documentElement.scrollTop;
  const tableWrap = document.querySelector('.report-table-wrap');
  const savedTableScrollLeft = tableWrap ? tableWrap.scrollLeft : 0;
  const savedTableScrollTop  = tableWrap ? tableWrap.scrollTop : 0;
  // Rebuild the HTML content
  app.innerHTML = `
    ${renderHeader()}
    ${renderSyncBar()}
    ${!meta.issuer?`<div class="setup-banner" onclick="openSetup()">⚠️ Tap to set your name and shift details</div>`:""}
    <div id="main-content">
  ${currentView === "list" ? renderList() :

    renderUnaccounted()}
</div>
    ${currentView==="list"?`<button class="fab" onclick="openAdd()">+</button>`:""}
  `;
  // 2. RESTORE TABLE SCROLL (Horizontal + Vertical inner scroll)
  if (savedTableScrollLeft > 0 || savedTableScrollTop > 0) {
    const newTableWrap = document.querySelector('.report-table-wrap');
    if (newTableWrap) {
      if (savedTableScrollLeft > 0) newTableWrap.scrollLeft = savedTableScrollLeft;
      if (savedTableScrollTop > 0)  newTableWrap.scrollTop  = savedTableScrollTop;
    }
  }
  // 3. RESTORE MAIN WINDOW SCROLL (Vertical page layout scroll)
  if (savedWindowScrollTop > 0) {
    window.scrollTo(0, savedWindowScrollTop);
  }
}

function renderSectionFilter() {
  const ap = activePermits();
  
  // 1. Pre-calculate occurrences of Order No within the SAME SHIFT once
  const orderShiftCounts = {};
  ap.forEach(p => {
    const num = String(p.orderNo || "").trim();
    const shift = String(p.shift || "").trim();
    if (num && shift) {
      const key = `${num}-${shift}`;
      orderShiftCounts[key] = (orderShiftCounts[key] || 0) + 1;
    }
  });

  const defs = [
    {key:"ALL",        cls:["pill-all","pill-all-off"],   label:"All", match: p => true},

    {key:"Electrical", cls:["pill-elec","pill-elec-off"], label:"⚡ Electrical", match: p => p.section==="Electrical"},
    {key:"Operation",  cls:["pill-oper","pill-oper-off"], label:"🏗️ Operation", match: p => p.section==="Operation"},
    {key:"returned",   cls:["pill-returned","pill-returned-off"], label:"🔁 Returned", match: p => p.status==="returned"},
    {key:"extended",   cls:["pill-extended","pill-extended-off"], label:"⏰ Extended", match: p => p.status==="extended"},
    {key:"neither",    cls:["pill-neither","pill-neither-off"], label:"❓ Neither", match: p => p.status!=="returned" && p.status!=="extended"},
    {key:"MA",         cls:["pill-ma","pill-ma-off"],        label:"MA", match: p => classifyOrder(p.orderNo)==="MA"},
    {key:"M2",         cls:["pill-m2","pill-m2-off"],        label:"M2", match: p => classifyOrder(p.orderNo)==="M2"},
    {key:"M3",         cls:["pill-m3","pill-m3-off"],        label:"M3", match: p => classifyOrder(p.orderNo)==="M3"},
    {key:"M4",         cls:["pill-m4","pill-m4-off"],        label:"M4", match: p => classifyOrder(p.orderNo)==="M4"},
    {
      key:"duplicates", 
      cls:["pill-duplicate","pill-duplicate-off"], 
      label:"⚠️ Duplicates", 
      match: p => {
        const num = String(p.orderNo || "").trim();
        const shift = String(p.shift || "").trim();
        return num && shift && orderShiftCounts[`${num}-${shift}`] > 1;

  return `<div class="section-filter">${defs.map(d=>{

    return `<button class="pill ${on?d.cls[0]:d.cls[1]}" onclick="setFilter('${d.key}')">${d.label} (${count})</button>`;
  }).join("")}</div>`;
}
function renderList() {

function renderReport() {
  const ap = activePermits();
  
  // 1. FIXED: Pre-calculate occurrences of Order No within the SAME SHIFT
  const orderShiftCounts = {};
  ap.forEach(p => {
    const num = String(p.orderNo || "").trim();
    const shift = String(p.shift || "").trim();
    if (num && shift) {
      const key = `${num}-${shift}`; // Unique key combination
      orderShiftCounts[key] = (orderShiftCounts[key] || 0) + 1;
    }
  });
  
  // Define priorities for Section and Order Type sorting rules
  const sectionPriority = { "Mechanical": 1, "Electrical": 2, "Operation": 3 };
  const orderTypePriority = { "MA": 1, "M3": 2, "M4": 3, "M2": 4, "M1": 5 };
  
  // 2. FIXED: Updated matching rules to respect the shift-scoped duplicate key
  const matchRules = {
    "ALL": p => true,
    "Mechanical": p => p.section==="Mechanical",
    "Electrical": p => p.section==="Electrical",
    "Operation": p => p.section==="Operation",
    "returned": p => p.status==="returned",
    "extended": p => p.status==="extended",
    "neither": p => p.status!=="returned" && p.status!=="extended",
    "MA": p => classifyOrder(p.orderNo)==="MA",
    "M2": p => classifyOrder(p.orderNo)==="M2",
    "M3": p => classifyOrder(p.orderNo)==="M3",
    "M4": p => classifyOrder(p.orderNo)==="M4",
    "duplicates": p => {
      const num = String(p.orderNo || "").trim();
      const shift = String(p.shift || "").trim();
      return num && shift && orderShiftCounts[`${num}-${shift}`] > 1;
    }
  };
  
  // 3. Apply the active filter restriction BEFORE sorting
  const permitsToProcess = matchRules[sectionFilter] ? ap.filter(matchRules[sectionFilter]) : ap.filter(p=>p.section===sectionFilter);
  
  // 4. Sort the filtered subset sequence
  const sortedPermits = [...permitsToProcess].sort((a, b) => {
    const secA = a.section || "";
    const secB = b.section || "";
    const pSecA = sectionPriority[secA] || 99;
    const pSecB = sectionPriority[secB] || 99;
    if (pSecA !== pSecB) return pSecA - pSecB;
    const typeA = classifyOrder(a.orderNo);
    const typeB = classifyOrder(b.orderNo);
    const pTypeA = orderTypePriority[typeA] || 99;
    const pTypeB = orderTypePriority[typeB] || 99;
    if (pTypeA !== pTypeB) return pTypeA - pTypeB;
    return ap.indexOf(a) - ap.indexOf(b);
  });
  
  // Map over filtered/sorted array to build table report rows
  const rows = sortedPermits.map((p, i) => {
    const oType = classifyOrder(p.orderNo);
    const currentNo = String(p.orderNo || "").trim();
    const currentShift = String(p.shift || "").trim();
    
    // FIXED: Check duplicates against the compound key
    const isDuplicate = currentNo && currentShift && orderShiftCounts[`${currentNo}-${currentShift}`] > 1;
    const rowBgStyle = isDuplicate ? ' style="background-color: #fee2e2;"' : '';
    
    return `<tr${rowBgStyle}>
      <td>${i + 1}</td>
      <td style="font-family:monospace;font-weight:700">
        ${esc(p.orderNo)} 
        ${isDuplicate ? `<span style="color:#b91c1c; font-size:10px; display:block; font-weight:bold;">⚠️ Duplicate</span>` : ''}
      </td>
      <td style="font-weight:700">${esc(oType)}</td>
      <td style="font-weight:700; text-align:center;">${esc(p.shift || "—")}</td>
      <td>${esc(p.section || "")}</td>
      <td>${esc(p.jobDescription)}</td>
      <td>${esc(p.receiver)}</td>
      <td>${esc(p.contactNo || "")}</td>
      <td>${esc(p.isolationTime || "—")}</td>
      <td>${esc(p.issueTime || "—")}</td>
      <td>${esc(p.extendedTime || "—")}</td>
      <td>${esc(p.returnedTime || "—")}</td>
      <td>${esc(p.status || "—")}</td>
      <td>${(p.isOnline === "TRUE" || p.isOnline === true) ? "Online" : "Isolated"}</td>
      <td>${esc(p.issuer || "")}</td>
    </tr>`;
  }).join("");
  
  // Visual label badge for current filter context in the report header
  const filterLabel = sectionFilter === "ALL" ? "All Records" : `Filtered: ${sectionFilter}`;
  
  return `<div class="report">
    <div class="report-header">
      <h2>PERMIT TRACKER</h2>
      <p>Date: ${esc(meta.date)} &nbsp;·&nbsp; Shift: ${esc(meta.shift)}</p>
      <div style="margin-top: 8px;"><span class="badge badge-blue" style="font-size: 11px; padding: 4px 8px;">📊 ${filterLabel} (${sortedPermits.length})</span></div>
    </div>
    <div class="report-actions">
      <button class="btn-excel" onclick="exportExcel()">📥 Export Excel</button>
      <button class="btn-share" onclick="shareReport()">📤 Share</button>
      <button id="capture-btn" onclick="captureReportImage()" style="background:#10b981; color:white;">📸 Save Image</button>
    </div>
    <div class="report-table-wrap">
      <table id="report-table">
        <thead><tr>
          <th>#</th><th>Order No</th><th>Type</th><th>Shift</th><th>Section</th>
          <th>Job Description</th><th>Receiver</th><th>Contact</th>
          <th>Isolation</th><th>Issue</th><th>Extended</th><th>Returned</th><th>Status</th>
          <th>Permit</th><th>By</th>
        </tr></thead>
        <tbody>${rows || `<tr><td colspan="15" style="text-align:center;color:#94a3b8;padding:20px">No matching permits for filter "${sectionFilter}"</td></tr>`}</tbody>
      </table>
    </div>
    <p class="report-hint">📸 Screenshot · or use Export / Share above</p>
  </div>`;
}

function dumpFullRangeDataCSV() {
  const startScore = getShiftScore(rangeStartDate, rangeStartShift);
  const endScore = getShiftScore(rangeEndDate, rangeEndShift);
  
  if (startScore > endScore) {
    alert("Invalid Date Range Selection Window!");
    return;
  }

  const rangePermits = permits.filter(p => {
    const d = String(p.shiftDate || "").trim();
    const s = String(p.shift || "").trim();
    if (!d || !s) return false;
    const itemScore = getShiftScore(d, s);
    return itemScore >= startScore && itemScore <= endScore;
  });

  if (rangePermits.length === 0) {
    alert("No records found within this timeframe.");
    return;
  }

  rangePermits.sort((a, b) => getShiftScore(a.shiftDate, a.shift) - getShiftScore(b.shiftDate, b.shift));

  const headers = ["System ID", "Shift Date", "Shift", "Order No", "Type", "Section", "Job Description", "Receiver", "Contact No", "Isolation Time", "Issue Time", "Extended Time", "Returned Time", "Permit Structure", "Status", "Issued By"];
  
  const rows = rangePermits.map(p => [
    p.id || "",
    p.shiftDate || "",
    p.shift || "",
    p.orderNo || "",
    classifyOrder(p.orderNo),
    p.section || "",
    p.jobDescription || "",
    p.receiver || "",
    p.contactNo || "",
    p.isolationTime || "—",
    p.issueTime || "—",
    p.extendedTime || "—",
    p.returnedTime || "—",
    (p.isOnline === "TRUE" || p.isOnline === true) ? "Online" : "Isolated",
    p.status || "Issued",
    p.issuer || ""
  ]);

  const csvContent = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement("a");
  a.href = url;
  a.download = `Full_CSV_Dump_${rangeStartDate.replace(/\//g, "-")}_to_${rangeEndDate.replace(/\//g, "-")}.csv`;
  
  document.body.appendChild(a);
  a.click();
  
  // Clean up immediately exactly like your working exportExcel function
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
}

function exportExcel() {
  const headers = ["#","Order No","Type","Section","Job Description","Receiver","Contact","Isolation Time","Issue Time","Extended Time","Returned Time","Permit Type","Status","Issued By"];
  const ap = activePermits();
  
  // 1. FIXED: Pre-calculate occurrences of Order No within the SAME SHIFT
  const orderShiftCounts = {};
  ap.forEach(p => {
    const num = String(p.orderNo || "").trim();
    const shift = String(p.shift || "").trim();
    if (num && shift) {
      const key = `${num}-${shift}`;
      orderShiftCounts[key] = (orderShiftCounts[key] || 0) + 1;
    }
  });
  
  const sectionPriority = { "Mechanical": 1, "Electrical": 2, "Operation": 3 };
  const orderTypePriority = { "MA": 1, "M3": 2, "M4": 3, "M2": 4, "M1": 5 };
  
  // 2. FIXED: Updated matching rules to use the shift-scoped duplicate rule
  const matchRules = {
    "ALL": p => true,
    "Mechanical": p => p.section==="Mechanical",
    "Electrical": p => p.section==="Electrical",
    "Operation": p => p.section==="Operation",
    "returned": p => p.status==="returned",
    "extended": p => p.status==="extended",
    "neither": p => p.status!=="returned" && p.status!=="extended",
    "MA": p => classifyOrder(p.orderNo)==="MA",
    "M2": p => classifyOrder(p.orderNo)==="M2",
    "M3": p => classifyOrder(p.orderNo)==="M3",
    "M4": p => classifyOrder(p.orderNo)==="M4",
    "duplicates": p => {
      const num = String(p.orderNo || "").trim();
      const shift = String(p.shift || "").trim();
      return num && shift && orderShiftCounts[`${num}-${shift}`] > 1;
    }
  };
  
  const permitsToProcess = matchRules[sectionFilter] ? ap.filter(matchRules[sectionFilter]) : ap.filter(p=>p.section===sectionFilter);
  
  const sortedPermits = [...permitsToProcess].sort((a, b) => {
    const secA = a.section || ""; const secB = b.section || "";
    const pSecA = sectionPriority[secA] || 99; const pSecB = sectionPriority[secB] || 99;
    if (pSecA !== pSecB) return pSecA - pSecB;
    const typeA = classifyOrder(a.orderNo); const typeB = classifyOrder(b.orderNo);
    const pTypeA = orderTypePriority[typeA] || 99; const pTypeB = orderTypePriority[typeB] || 99;
    if (pTypeA !== pTypeB) return pTypeA - pTypeB;
    return ap.indexOf(a) - ap.indexOf(b);
  });
  
  const rows = sortedPermits.map((p, i) => {
    const currentNo = String(p.orderNo || "").trim();
    const currentShift = String(p.shift || "").trim();
    
    // FIXED: Verify duplicate criteria against the shift-scoped compound key
    const isDuplicate = currentNo && currentShift && orderShiftCounts[`${currentNo}-${currentShift}`] > 1;
    const orderCellValue = isDuplicate ? `${p.orderNo} (⚠️ Duplicate)` : p.orderNo;
    
    return [
      i + 1, orderCellValue, classifyOrder(p.orderNo), p.section || "",
      p.jobDescription, p.receiver, p.contactNo || "", p.isolationTime || "", 
      p.issueTime || "", p.extendedTime || "", p.returnedTime || "",
      (p.isOnline === "TRUE" || p.isOnline === true) ? "Online" : "Isolated",
      p.status || "—", p.issuer || ""
    ];
  });
  
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; 
  a.download = `Permits_${sectionFilter}_Shift${meta.shift}_${meta.date.replace(/\//g, "-")}.csv`;
  
  document.body.appendChild(a); 
  a.click(); 
  
  // Clean up execution environment immediately
  setTimeout(() => {
    document.body.removeChild(a); 
    URL.revokeObjectURL(url);
  }, 100);
}

// ══════════════════════════════════════
//  AUTOCOMPLETE
//  ROOT FIX: Never pass strings through
//  onclick HTML attributes — they break
//  on special chars and quotes.
//  Instead: store matches in a JS Map,
//  reference by numeric index only.
// ══════════════════════════════════════
let acTarget = null;
const acStore = {}; // listId -> { matches[], inputId, field }
function acGetSuggestions(field, query) {
  if (!query) return [];
  const q = query.toLowerCase();
  const seen = new Set();
  return permits
    .map(p => {
        // Safely convert whatever value exists to a string first
        const val = p[field] !== undefined && p[field] !== null ? String(p[field]) : "";
        return val.trim();
    })
    .filter(v => {
        if (!v || seen.has(v)) return false;
        seen.add(v);
        return v.toLowerCase().includes(q);
    })
    .slice(0, 7);
}
function acShow(field, inputId, listId) {
  const input = document.getElementById(inputId);
  const list  = document.getElementById(listId);
  if (!input||!list) return;
  const query = input.value;
  const matches = acGetSuggestions(field, query);
  if (!matches.length) { list.style.display="none"; return; }
  // Store matches in JS — DO NOT pass values through HTML attributes
  acStore[listId] = { matches, inputId, field };
  const q = query.toLowerCase();
  list.innerHTML = matches.map((m, idx)=>{
    const i = m.toLowerCase().indexOf(q);
    const hi = i>=0
      ? esc(m.slice(0,i))+"<b>"+esc(m.slice(i,i+q.length))+"</b>"+esc(m.slice(i+q.length))
      : esc(m);
    // Pass only the numeric index — completely safe in HTML attribute
    return `<div class="ac-item" data-idx="${idx}">${hi}</div>`;
  }).join("");
  // Attach listeners directly to DOM elements — no attribute encoding needed
  list.querySelectorAll(".ac-item").forEach(el=>{
    const handler = e=>{
      e.preventDefault();
      e.stopPropagation();
      const idx = parseInt(el.getAttribute("data-idx"));
      const store = acStore[listId];
      if (!store) return;
      const value = store.matches[idx];
      const inp = document.getElementById(store.inputId);
      if (inp) inp.value = value;
      list.style.display="none";
      acTarget = null;
      // Auto-fill contact when receiver picked
      if (store.field==="receiver") {
        const match = permits.find(p=>p.receiver===value&&p.contactNo);
        if (match) { const c=document.getElementById("f-contact"); if(c&&!c.value) c.value=match.contactNo; }
      }
      // Auto-fill job description when order number picked
      if (store.field==="orderNo") {
        const match = permits.find(p=>p.orderNo==value && p.jobDescription);
        if (match) { const jd=document.getElementById("f-jobDesc"); if (jd && !jd.value) jd.value = match.jobDescription; }
      }
    };
    el.addEventListener("touchend", handler, {passive:false});
    el.addEventListener("click", handler);
  });
  list.style.display="block";
  acTarget = listId;
}

function startScan() {
  showModal(`
    <div class="modal-header">
      <span class="modal-title">📷 Scan Permit</span>
      <button class="close-btn" onclick="removeModal()">×</button>
    </div>

      </p>
      <img id="scan-preview" class="scan-preview">
      <div id="scan-status" class="scan-status">⏳ Reading permit...</div>
      <input type="file" id="scan-file" accept="image/*" capture="environment" onchange="processScan(this)">
      <button class="btn-primary" onclick="document.getElementById('scan-file').click()">
        📷 Open Camera
      </button>
      <button class="btn-secondary" style="margin-top:10px;width:100%" onclick="showPermitForm()">
        ✏️ Skip — Enter Manually
      </button>
    </div>`);
}
async function processScan(input) {
  const file = input.files[0];
  if (!file) return;
  // Show preview
  const preview = document.getElementById("scan-preview");
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
  const status = document.getElementById("scan-status");
  status.style.display = "block";
  status.innerHTML = "⏳ Reading permit... this takes ~10 seconds";
  try {
    const result = await Tesseract.recognize(file, "eng", {
      logger: m => {
        if (m.status === "recognizing text") {
          const pct = Math.round(m.progress * 100);
          if (status) status.innerHTML = "⏳ Reading... " + pct + "%";
        }
      }
    });
    const text = result.data.text;
    console.log("OCR raw text:", text);
    // Extract Order No — find 8 or 9 digit number
    // Permit format: Order No/HW  14054013/200664255
    // We want the FIRST number before the slash — the work order
    const orderMatch = text.match(/\b(1\d{7}|[1-4]\d{8})\b/);
    const orderNo = orderMatch ? orderMatch[1] : "";
    // Extract Description of Work
    // Label on permit: "Description of Work"
    const descMatch = text.match(/Description\s+of\s+Work[:\s]+([^\n]+)/i);
    let jobDesc = descMatch ? descMatch[1].trim() : "";
    // Clean up OCR noise — remove leading punctuation
    jobDesc = jobDesc.replace(/^[^a-zA-Z0-9]+/, "").trim();
    status.style.display = "none";
    if (!orderNo && !jobDesc) {
      status.style.display = "block";
      status.style.background = "#fff1f2";
      status.style.borderColor = "#fecdd3";
      status.style.color = "#be123c";
      status.innerHTML = "⚠️ Could not read permit clearly. Try better lighting or enter manually.";
      return;
    }
    // Open form with extracted values pre-filled
    removeModal();
    showPermitForm({ orderNo, jobDescription: jobDesc });
    // Show what was found
    if (orderNo || jobDesc) {
      setTimeout(() => {
        const banner = document.createElement("div");
        banner.style = "background:#dcfce7;border:1px solid #bbf7d0;border-radius:10px;padding:10px 12px;font-size:12px;color:#16a34a;margin-bottom:14px";
        banner.innerHTML = "✅ Scanned: " +
          (orderNo ? "<b>Order " + orderNo + "</b> " : "") +
          (jobDesc ? "· " + jobDesc.slice(0,40) + (jobDesc.length>40?"...":"") : "");
        const body = document.querySelector(".modal-body");
        if (body) body.insertBefore(banner, body.firstChild);
      }, 100);
    }
  } catch(err) {
    console.error("OCR error:", err);
    if (status) {
      status.style.display = "block";
      status.style.background = "#fff1f2";
      status.style.color = "#be123c";
      status.innerHTML = "❌ Scan failed. Please enter manually.";
    }
  }
}
// ══════════════════════════════════════
//  SAVE / DELETE
// ══════════════════════════════════════
async function savePermit(isEdit) {
  const orderNo        = document.getElementById("f-orderNo").value.trim();
  const jobDescription = document.getElementById("f-jobDesc").value.trim();
  const receiver       = document.getElementById("f-receiver").value.trim();
  const contactNo      = document.getElementById("f-contact").value.trim();
  const section        = document.getElementById("f-section").value.trim();
  const status         = document.getElementById("f-status").value.trim();
  const isOnline       = document.getElementById("f-online").checked;
  const isolationTime  = isOnline?"":(document.getElementById("f-isoTime").value||"");
  const issueTime      = document.getElementById("f-issueTime").value||"";
  const extendedTime   = document.getElementById("f-extTime")?.value||"";
  const returnedTime   = document.getElementById("f-retTime")?.value||"";
  if (!orderNo||!jobDescription||!receiver) { alert("Order No, Job Description and Receiver are required."); return; }
  if (!section) { alert("Please select a Section."); return; }
  const btn = document.getElementById("save-btn");
  btn.disabled=true; btn.textContent="Saving...";
  try {
    const permit = { orderNo, jobDescription, receiver, contactNo, section, status, isOnline, isolationTime, issueTime, extendedTime, returnedTime, issuer:meta.issuer, shiftDate:meta.date, shift:meta.shift };
    if (isEdit) { permit.id=editingPermit.id; await api("update",{permit}); }
    else { await api("add",{permit}); }
    removeModal(); await doRefresh();
  } catch(err) {
    alert("Save failed: "+err.message);
    btn.disabled=false; btn.textContent=isEdit?"Update Permit":"Add Permit";
  }
}
async function confirmDelete() {
  // 1. Prompt for password authentication
  const password = prompt("Enter password to delete this permit:");
  if (password === null) return; // User clicked Cancel
  // 2. Set your desired password here (e.g., "ARS2026")
  if (password !== "sherlockholmes1") {
    alert("❌ Incorrect password. Access denied. Contact admin");
    return;
  }
  // 3. Final confirmation before removing from database
  if (!confirm("Are you absolutely sure you want to delete this permit entry?")) return;
  try { 
    await api("delete",{id:editingPermit.id}); 
    removeModal(); 
    await doRefresh(); 
  } catch(err) { 
    alert("Delete failed: "+err.message); 
  }
}
function openAdd() {
  showModal(`
    <div class="modal-header">
      <span class="modal-title">New Permit</span>
      <button class="close-btn" onclick="removeModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:#64748b;margin-bottom:14px">How do you want to add this permit?</p>
      <div class="scan-choice">
        <button onclick="startScan()">
          <span>📷</span>
          Scan Permit
        </button>
        <button onclick="showPermitForm()">
          <span>✏️</span>
          Enter Manually
        </button>
      </div>
    </div>`);
}
function showPermitForm(prefill={}) {
  showModal(permitFormHTML("New Permit", prefill, false));
}
function openEdit(id) {
  editingPermit = permits.find(p=>String(p.id)===String(id));
  if (!editingPermit) { alert("Could not find permit. Try refreshing."); return; }
  showModal(permitFormHTML("Edit Permit",editingPermit,true));
}
// ══════════════════════════════════════
//  SETUP
// ══════════════════════════════════════
function openSetup() {
  showModal(`
    <div class="modal-header"><span class="modal-title">Shift Setup</span><button class="close-btn" onclick="removeModal()">×</button></div>
    <div class="modal-body" style="background-color: #ffffff !important; color: #1e293b !important;">
      <p style="font-size:13px;color:#64748b;margin-bottom:16px">Each phone sets its own issuer name. Date and shift are shared.</p>
      <div class="field"><label>Date</label><input id="s-date" type="date" value="${meta.date.split("/").reverse().join("-")}"></div>
      <div class="field">
        <label>Shift</label>
        <select id="s-shift">
          ${["", "A", "B", "C", "G"].map(s => `<option value="${s}" ${meta.shift === s ? "selected" : ""}>${s === "" ? "— All Shifts (Blank) —" : s}</option>`).join("")}
        </select>
      </div>
      <div class="field"><label>Your Name (Issuer)</label><input id="s-issuer" placeholder="e.g. Omkar" value="${esc(meta.issuer||"")}"></div>
      <div style="background-color: #eff6ff !important; border: 1px solid #bfdbfe !important; border-radius: 8px !important; padding: 12px !important; margin-top: 14px !important; margin-bottom: 14px !important; display: block !important; clear: both !important;">
        <label style="font-weight:700 !important; font-size:11px !important; color:#1e3a5f !important; display:block !important; margin-bottom:4px !important;">YOUR TRUST SHARE KEY</label>
        <div style="display:flex !important; gap:8px !important; align-items:center !important;">
          <input type="text" readonly value="${DEVICE_TOKEN}" style="flex:1 !important; padding:6px !important; font-size:13px !important; font-family:monospace !important; background-color:#ffffff !important; border:1px solid #cbd5e1 !important; border-radius:6px !important; color:#000000 !important;" id="trust-key-field">
          <button type="button" style="padding:6px 10px !important; height:32px !important; margin:0 !important; cursor:pointer !important; background-color:#e2e8f0 !important; color:#1e293b !important; border:1px solid #cbd5e1 !important; border-radius:6px !important; font-size:12px !important;" onclick="navigator.clipboard.writeText('${DEVICE_TOKEN}'); alert('Copied to clipboard!');">📋 Copy</button>
        </div>
      </div>
      <div class="field" style="margin-top:14px !important; margin-bottom:16px !important;">
        <label>Link Colleague Device Signature</label>
        <div style="display:flex !important; gap:8px !important;">
          <input id="s-peer-token" type="text" placeholder="Paste peer's DEV- token key" style="font-size:14px !important; padding:10px !important; flex: 1 !important;">
          <button type="button" class="btn-primary" style="padding:0 14px !important; width:auto !important; font-size:13px !important; white-space:nowrap !important; border-radius:10px !important; margin:0 !important;" onclick="linkDeviceHandshake()">Link Device</button>
        </div>
      </div>
      <button class="btn-primary" onclick="saveSetup()">Save & Continue</button>
      <div style="margin-top:16px !important;padding-top:16px !important;border-top:1px solid #f1f5f9 !important;clear: both !important;">
        <button onclick="resetUrl()" style="background:none !important;border:none !important;color:#94a3b8 !important;font-size:12px !important;cursor:pointer !important;">Change API URL</button>
      </div>
    </div>`);
}
async function linkDeviceHandshake() {
  const peerToken = document.getElementById("s-peer-token").value.trim();
  if (!peerToken || !peerToken.startsWith("DEV-")) {
    alert("Please enter a valid colleague device token (starting with 'DEV-')");
    return;
  }
  if (peerToken === DEVICE_TOKEN) {
    alert("You cannot establish a trust handshake with your own device token.");
    return;
  }
  try {
    await api("grantGlobalTrust", { trustTarget: peerToken });
    alert("Global Trust handshake established successfully! This colleague can now edit or update records you create.");
    document.getElementById("s-peer-token").value = "";
  } catch (err) {
    alert("Failed to save trust mapping: " + err.message);
  }
}
async function saveSetup() {
  const parts = document.getElementById("s-date").value.split("-");
  meta = {
    date:   parts[2]+"/"+parts[1]+"/"+parts[0],
    shift:  document.getElementById("s-shift").value,
    issuer: document.getElementById("s-issuer").value.trim()
  };
  // Save to localStorage — this is the source of truth for meta
  localStorage.setItem("ars2_meta", JSON.stringify(meta));
  removeModal();
  render();
}
function saveUrl() {
  const url=document.getElementById("url-input").value.trim();
  if (!url.startsWith("https://script.google.com")) { alert("Please paste a valid Google Apps Script URL."); return; }
  API_URL=url; localStorage.setItem("ars2_api_url",url); init();
}
function resetUrl() {
  if (!confirm("Reset API URL?")) return;
  API_URL=""; localStorage.removeItem("ars2_api_url"); removeModal(); render();
}
function setFilter(s) { sectionFilter=s; render(); }
function switchView(v) { currentView=v; render(); }
// ══════════════════════════════════════
//  REFRESH MANAGEMENT
// ══════════════════════════════════════
async function doRefresh(isAuto = false) {
  if (!API_URL) return;
  // 1. Skip automatic background syncing if a form/modal is currently open
  if (isAuto && document.getElementById("modal-overlay")) return;
  syncing = true;
  // 2. Quietly update just the sync button text instead of wiping the whole page layout
  const syncBtn = document.querySelector(".header-actions button");
  if (syncBtn) syncBtn.textContent = "⏳";
  try { 
    await loadAll(); 
  } catch(err) { 
    console.error(err); 
  }
  syncing = false;
  // 3. Render once at the end to smoothly display the fresh data
  render();
}
async function init() {
  render(); 
  if (!API_URL) return;
  await doRefresh(false); // Initial manual load
  if (refreshTimer) clearInterval(refreshTimer);
  // Pass true to indicate this is an automated background refresh
  refreshTimer = setInterval(() => doRefresh(true), 20000);
}
init();
</script>
